# Lead Intel self-host. Default = LOCAL mode (ports bound to localhost, no Traefik).
# For VPS: docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d --build

services:
  leadintel:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54422}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID:-leadintel-selfhost}
        VITE_OTHER_APP_URL: ${VITE_OTHER_APP_URL:-http://localhost:3100}
        VITE_OTHER_APP_NAME: ${VITE_OTHER_APP_NAME:-ACQ Coach}
        VITE_LAUNCHER_URL: ${VITE_LAUNCHER_URL:-http://localhost:8080}
    image: leadintel:latest
    container_name: leadintel
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_FRONTEND_PORT:-3101}:3000"
      - "${HOST_API_PORT:-54422}:54321"
    volumes:
      - leadintel_pgdata:/var/lib/postgresql/data
    networks:
      - leadintel-net

  leadintel-edge:
    image: supabase/edge-runtime:v1.58.4
    container_name: leadintel-edge
    restart: unless-stopped
    depends_on:
      - leadintel
    command:
      - "start"
      - "--main-service"
      - "/home/deno/functions/main"
    volumes:
      - ./supabase/functions:/home/deno/functions:ro
    environment:
      SUPABASE_URL: "http://leadintel:54321"
      SUPABASE_ANON_KEY: "${ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SERVICE_ROLE_KEY}"
      SUPABASE_DB_URL: "postgres://postgres:${POSTGRES_PASSWORD}@leadintel:5432/${POSTGRES_DB:-leadintel}"
      JWT_SECRET: "${JWT_SECRET}"
      ANTHROPIC_API_KEY:        "${ANTHROPIC_API_KEY:-}"
      DEEPGRAM_API_KEY:         "${DEEPGRAM_API_KEY:-}"
      STRIPE_TEST_SECRET_KEY:        "${STRIPE_TEST_SECRET_KEY:-}"
      STRIPE_TEST_PUBLISHABLE_KEY:   "${STRIPE_TEST_PUBLISHABLE_KEY:-}"
      STRIPE_TEST_WEBHOOK_SECRET:    "${STRIPE_TEST_WEBHOOK_SECRET:-}"
      STRIPE_LIVE_SECRET_KEY:        "${STRIPE_LIVE_SECRET_KEY:-}"
      STRIPE_LIVE_PUBLISHABLE_KEY:   "${STRIPE_LIVE_PUBLISHABLE_KEY:-}"
      STRIPE_LIVE_WEBHOOK_SECRET:    "${STRIPE_LIVE_WEBHOOK_SECRET:-}"
      CRON_SECRET:              "${CRON_SECRET:-}"
      GHL_PIT_TOKEN:            "${GHL_PIT_TOKEN:-}"
      GHL_LOCATION_ID:          "${GHL_LOCATION_ID:-}"
    networks:
      - leadintel-net

volumes:
  leadintel_pgdata:

networks:
  leadintel-net:
    driver: bridge
