worker_processes 1;
daemon off;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events { worker_connections 1024; }

http {
  access_log /dev/stdout;
  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path       /tmp/nginx-proxy;
  fastcgi_temp_path     /tmp/nginx-fastcgi;
  uwsgi_temp_path       /tmp/nginx-uwsgi;
  scgi_temp_path        /tmp/nginx-scgi;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  # ─── Frontend (Vite static files on port 3000) ──────────
  server {
    listen 3000 default_server;
    server_name _;

    root /var/www/html;
    index index.html;

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|webp|svg|map)$ {
      try_files $uri =404;
      expires 30d;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
  }

  # ─── Supabase API gateway on port 54321 ─────────────────
  server {
    listen 54321 default_server;
    server_name _;
    client_max_body_size 50m;

    add_header Access-Control-Allow-Origin      $http_origin always;
    add_header Access-Control-Allow-Methods     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header Access-Control-Allow-Headers     'authorization, apikey, content-type, x-client-info, x-supabase-api-version, prefer, range, accept-profile, content-profile' always;
    add_header Access-Control-Allow-Credentials 'true' always;
    add_header Access-Control-Expose-Headers    'content-range, x-total-count' always;
    add_header Access-Control-Max-Age           86400 always;

    if ($request_method = OPTIONS) { return 204; }

    location /auth/v1/ {
      rewrite ^/auth/v1/(.*)$ /$1 break;
      proxy_pass http://127.0.0.1:9999;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Expose-Headers;
      proxy_hide_header Access-Control-Max-Age;
    }

    location /rest/v1/ {
      rewrite ^/rest/v1/(.*)$ /$1 break;
      proxy_pass http://127.0.0.1:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Accept-Profile $http_accept_profile;
      proxy_set_header Content-Profile $http_content_profile;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Expose-Headers;
      proxy_hide_header Access-Control-Max-Age;
    }

    # ─── Edge functions: 29 functions in sibling leadintel-edge container ──
    location /functions/v1/ {
      rewrite ^/functions/v1/(.*)$ /$1 break;
      proxy_pass http://leadintel-edge:9000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Expose-Headers;
      proxy_hide_header Access-Control-Max-Age;
    }

    location = /health {
      access_log off;
      add_header Access-Control-Allow-Origin      $http_origin always;
      add_header Access-Control-Allow-Methods     'GET, POST, OPTIONS' always;
      add_header Access-Control-Allow-Credentials 'true' always;
      add_header Content-Type text/plain always;
      return 200 "ok\n";
    }
  }
}
