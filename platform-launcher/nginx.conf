server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /config.json {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Access-Control-Allow-Origin "*";
    try_files /config.json =404;
  }

  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Proxy /admin-api/* to the platform-admin-api sidecar on the docker network.
  # Browser → launcher:80 → admin-api:8080 (same origin, no CORS dance).
  location /admin-api/ {
    proxy_pass http://platform-admin-api:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;
    proxy_read_timeout 60s;
  }

  # Proxy /auth/* → platform-auth (GoTrue) on the docker network.
  # Browser → launcher:80/auth/... → platform-auth:9999/...
  # The trailing-slash on `proxy_pass http://...:9999/;` strips the `/auth`
  # prefix so /auth/token → /token, /auth/user → /user. Same-origin keeps
  # cookies + CORS simple; one fewer subdomain to manage. Auth flows are
  # request-response (no long-poll) so the default 60s timeout is fine.
  location /auth/ {
    proxy_pass http://platform-auth:9999/;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Authorization     $http_authorization;
    proxy_read_timeout 60s;
  }
}
